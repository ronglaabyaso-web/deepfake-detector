<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1c">
<title>DEEPFAKE DETECTOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ---------- มินิมอล: ธีมมืด สีฟ้า #0ea5e9 ตัวอักษรใหญ่ ปุ่มใหญ่ ---------- */
:root {
  --bg: #0a0f1c;
  --card: rgba(146, 180, 255, .05);
  --card2: rgba(146, 180, 255, .09);
  --line: rgba(146, 180, 255, .11);
  --accent: #0ea5e9;
  --accent-2: #38bdf8;
  --accent-dark: #0284c7;
  --text: #f2f6fc;
  --muted: #8fa3bf;
  --good: #34d399;
  --warn: #fbbf24;
  --bad: #f87171;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body {
  font-family: "IBM Plex Sans Thai", "Sarabun", "Noto Sans Thai", "Leelawadee UI", system-ui, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(60rem 42rem at 50% -14rem, rgba(14, 165, 233, .10), transparent 60%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
#app { max-width: 560px; margin: 0 auto; padding: 16px 16px 100px; }

h1 { font-size: 1.55rem; margin-bottom: 4px; font-weight: 700; letter-spacing: -.01em; }
h2 {
  font-size: 1.15rem; margin: 26px 0 14px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
h2::before {
  content: ""; width: 4px; height: 1.05em; border-radius: 99px; flex: none;
  background: linear-gradient(180deg, var(--accent-2), var(--accent));
}
h3 { font-size: 1.05rem; }
p { line-height: 1.65; }

.page { display: none; }
.page.active { display: block; animation: fadein .22s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  border: 1px solid var(--line);
}
.muted { color: var(--muted); font-size: .95rem; line-height: 1.6; }

/* ปุ่ม */
.btn {
  display: block; width: 100%;
  background: linear-gradient(135deg, var(--accent-2), var(--accent));
  color: #041420;
  border: none; border-radius: 16px;
  padding: 16px; font-size: 1.1rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 10px 30px -12px rgba(14, 165, 233, .5);
  transition: transform .06s ease, box-shadow .15s, opacity .15s;
}
.btn:active { transform: scale(.985); }
.btn:disabled { opacity: .55; cursor: default; box-shadow: none; }
.btn.secondary { background: var(--card2); color: var(--text); border: 1px solid var(--line); box-shadow: none; }
.btn.danger { background: rgba(248, 113, 113, .10); color: #fca5a5; border: 1px solid rgba(248, 113, 113, .3); box-shadow: none; }
.btn + .btn { margin-top: 10px; }

/* input */
.field { margin-bottom: 14px; }
.field label { display: block; margin-bottom: 7px; font-weight: 600; font-size: .95rem; color: var(--muted); }
input[type=text], input[type=password], input[type=url], textarea {
  width: 100%; background: var(--card2); color: var(--text);
  border: 1.5px solid var(--line); border-radius: 14px;
  padding: 14px 16px; font-size: 1.05rem; font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
input::placeholder, textarea::placeholder { color: rgba(143, 163, 191, .55); }
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14, 165, 233, .16); }
textarea { min-height: 130px; resize: vertical; }

/* แท็บ (segmented pill) */
.tabs {
  display: flex; gap: 5px; margin-bottom: 16px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: 999px; padding: 5px;
}
.tabs button {
  flex: 1; padding: 11px; border-radius: 999px; border: none;
  background: transparent; color: var(--muted);
  font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: background .15s, color .15s;
}
.tabs button.on { background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: #041420; }

/* bottom nav (กระจกฝ้า) */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  display: none; justify-content: space-around;
  background: rgba(10, 15, 28, .82);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
}
#nav button {
  background: none; border: none; color: var(--muted);
  font-family: inherit; font-size: .76rem; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 7px 13px; border-radius: 14px; min-width: 62px;
  transition: background .15s, color .15s;
}
#nav button .ic { font-size: 1.4rem; }
#nav button.on { color: #dff3ff; background: rgba(14, 165, 233, .15); }

/* ผลตรวจ */
.badge {
  display: inline-block; padding: 6px 15px; border-radius: 999px;
  font-size: .9rem; font-weight: 700;
}
.badge::before { content: "●"; font-size: .58rem; margin-right: 7px; vertical-align: 2px; }
.signal { display: flex; gap: 9px; margin: 9px 0; line-height: 1.55; }
.signal .dot { flex: none; }

.disclaimer {
  background: rgba(163, 230, 53, .07); border: 1px solid rgba(163, 230, 53, .22);
  color: #d5eeb0; border-radius: 14px; padding: 12px 15px;
  font-size: .92rem; line-height: 1.6; margin-top: 14px;
}

/* home shortcut */
.shortcut {
  display: flex; align-items: center; gap: 16px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px;
  cursor: pointer; width: 100%; text-align: left;
  font-family: inherit; color: var(--text); font-size: 1rem;
  transition: background .15s, transform .06s;
}
.shortcut:active { background: var(--card2); transform: scale(.99); }
.shortcut::after { content: "›"; margin-left: auto; color: var(--muted); font-size: 1.5rem; font-weight: 300; }
.shortcut .ic {
  font-size: 1.45rem; flex: none;
  width: 52px; height: 52px; display: grid; place-items: center;
  background: rgba(14, 165, 233, .10); border: 1px solid rgba(14, 165, 233, .18);
  border-radius: 16px;
}
.shortcut b { font-size: 1.1rem; display: block; margin-bottom: 3px; }

/* เลขลำดับกฎทอง */
.rule-card { display: flex; gap: 15px; align-items: flex-start; }
.rule-num {
  width: 42px; height: 42px; border-radius: 13px; flex: none;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--accent-2), var(--accent));
  color: #041420; font-weight: 800; font-size: 1.15rem;
  box-shadow: 0 6px 18px -8px rgba(14, 165, 233, .6);
}
/* ไอคอน chip หน้าหัวข้อกลโกง */
.acc-ic {
  width: 40px; height: 40px; border-radius: 12px; flex: none;
  display: grid; place-items: center; font-size: 1.1rem;
  background: rgba(14, 165, 233, .10); border: 1px solid rgba(14, 165, 233, .18);
}
/* แถบความคืบหน้าแบบทดสอบ */
.quiz-progress { height: 6px; background: var(--card2); border-radius: 99px; overflow: hidden; margin: 10px 0 16px; }
.quiz-progress > div { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent-2), var(--accent)); transition: width .3s ease; }
/* วงแหวนความเสี่ยง */
.ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 8px 0 6px; }
.ring-wrap svg { display: block; font-family: inherit; }

/* accordion */
.acc-item { border: 1px solid var(--line); border-radius: 16px; margin-bottom: 10px; overflow: hidden; background: var(--card); }
.acc-head {
  width: 100%; display: flex; align-items: center; gap: 12px;
  background: transparent; color: var(--text); border: none;
  padding: 16px; font-size: 1rem; font-weight: 600;
  font-family: inherit; cursor: pointer; text-align: left;
}
.acc-head .ar { margin-left: auto; transition: transform .2s; color: var(--muted); font-size: .8rem; }
.acc-item.open .ar { transform: rotate(90deg); }
.acc-body { display: none; padding: 0 16px 16px; }
.acc-item.open .acc-body { display: block; }
.acc-warn {
  margin-top: 12px; background: rgba(251, 191, 36, .07); border: 1px solid rgba(251, 191, 36, .22);
  color: #fbd98a; padding: 11px 13px; border-radius: 12px; font-size: .94rem; line-height: 1.55;
}

/* แชท */
#chatMessages { display: flex; flex-direction: column; gap: 10px; min-height: 220px; margin-bottom: 14px; }
.msg { max-width: 86%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #eaf6ff; border-bottom-right-radius: 6px; }
.msg.bot { align-self: flex-start; background: var(--card2); border: 1px solid var(--line); border-bottom-left-radius: 6px; }
.chatrow { display: flex; gap: 8px; align-items: center; }
.chatrow input { flex: 1; border-radius: 999px; }
.chatrow .btn { width: auto; padding: 14px 24px; border-radius: 999px; }

/* quiz */
.quiz-choice {
  display: block; width: 100%; text-align: left;
  background: var(--card2); color: var(--text);
  border: 1.5px solid var(--line); border-radius: 14px;
  padding: 14px 16px; margin-bottom: 10px;
  font-size: 1rem; font-family: inherit; cursor: pointer; line-height: 1.55;
  transition: background .15s, border-color .15s;
}
.quiz-choice.correct { border-color: var(--good); background: rgba(52, 211, 153, .10); }
.quiz-choice.wrong { border-color: var(--bad); background: rgba(248, 113, 113, .10); }
.quiz-choice:disabled { cursor: default; opacity: .92; }
.quiz-explain { border-radius: 12px; padding: 12px 15px; margin: 6px 0 12px; line-height: 1.6; font-size: .96rem; }
.quiz-explain.ok { background: rgba(52, 211, 153, .08); border: 1px solid rgba(52, 211, 153, .25); color: #b5ecd6; }
.quiz-explain.no { background: rgba(248, 113, 113, .08); border: 1px solid rgba(248, 113, 113, .25); color: #fbc7c7; }

/* loading / error */
.spinner {
  width: 32px; height: 32px; margin: 8px auto;
  border: 3.5px solid var(--card2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.center { text-align: center; }
.errbox {
  background: rgba(248, 113, 113, .08); border: 1px solid rgba(248, 113, 113, .28);
  color: #fbc7c7; border-radius: 14px; padding: 13px 16px; line-height: 1.6;
}
.hidden { display: none !important; }

/* หน้าเข้าสู่ระบบ */
#page-login .logo { text-align: center; margin: 44px 0 26px; }
.logo-badge svg { display: block; margin: 0 auto; filter: drop-shadow(0 8px 24px rgba(14, 165, 233, .35)); }
.brand { font-size: 1.32rem; letter-spacing: .17em; margin-top: 18px; white-space: nowrap; }
.brand .brand-thin { font-weight: 300; color: var(--text); }
.brand .brand-bold {
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
#page-login .logo .muted { margin-top: 8px; }
.hr-text { display: flex; align-items: center; gap: 12px; color: var(--muted); margin: 18px 0; font-size: .88rem; }
.hr-text::before, .hr-text::after { content: ""; flex: 1; height: 1px; background: var(--line); }

.hotline-card { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.hotline-card:last-child { border-bottom: none; padding-bottom: 4px; }
.hotline-num { font-size: 1.55rem; font-weight: 800; color: var(--accent-2); flex: none; }
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav"></nav>

<script>
"use strict";
/* =====================================================================
   ตัวช่วยจับคลิปปลอม — ทั้งแอปในไฟล์เดียว (vanilla JS)

   กฎเหล็ก (กันบั๊ก input หลุด focus):
   - สร้าง DOM ของแต่ละหน้า "ครั้งเดียว" ผ่าน ensureBuilt() แล้วสลับด้วยซ่อน/แสดง
   - ห้ามเขียน innerHTML ทับ container ที่มี input/textarea ที่ผู้ใช้พิมพ์อยู่
   - อัปเดตเฉพาะ container ผลลัพธ์ (#videoResult #textResult #chatMessages #quizArea)
   - ผูก event ด้วย addEventListener ครั้งเดียวตอนสร้างหน้า ไม่ใช้ inline onclick
===================================================================== */

/* ---------- ที่อยู่เซิร์ฟเวอร์: ตรวจ origin เองอัตโนมัติ ---------- */
function apiBase() {
  const saved = localStorage.getItem("apiBase");
  if (saved) return saved.replace(/\/+$/, "");
  // เปิดจากเซิร์ฟเวอร์เดียวกับ backend (localhost/LAN/tunnel) → เรียกที่เดียวกัน
  if (location.protocol.startsWith("http")) return location.origin;
  return "http://localhost:8000";
}
async function api(path, options) {
  const res = await fetch(apiBase() + path, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* ไม่ใช่ JSON */ }
  if (!res.ok) {
    const msg = (data && data.error_th) || "ติดต่อเซิร์ฟเวอร์ไม่ได้ ลองใหม่อีกครั้งนะคะ";
    const err = new Error(msg); err.data = data; throw err;
  }
  return data;
}
function post(path, body) { return api(path, { method: "POST", body: JSON.stringify(body || {}) }); }

/* ---------- สถานะผู้ใช้ ---------- */
const state = {
  token: localStorage.getItem("token") || null,
  username: localStorage.getItem("username") || null,
  guest: localStorage.getItem("guest") === "1",
};
function saveAuth(token, username) {
  state.token = token; state.username = username; state.guest = false;
  localStorage.setItem("token", token);
  localStorage.setItem("username", username);
  localStorage.removeItem("guest");
}
function saveGuest() {
  state.token = null; state.username = null; state.guest = true;
  localStorage.removeItem("token"); localStorage.removeItem("username");
  localStorage.setItem("guest", "1");
}
function clearAuth() {
  state.token = null; state.username = null; state.guest = false;
  localStorage.removeItem("token"); localStorage.removeItem("username");
  localStorage.removeItem("guest");
}
function isLoggedIn() { return !!state.token || state.guest; }

/* ---------- ตัวช่วยสร้าง DOM ---------- */
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "text") node.textContent = v;
    else if (k === "html") node.innerHTML = v; // ใช้กับเนื้อหา static ที่เราสร้างเองเท่านั้น
    else node.setAttribute(k, v);
  }
  for (const ch of children) {
    if (ch == null) continue;
    node.appendChild(typeof ch === "string" ? document.createTextNode(ch) : ch);
  }
  return node;
}
function riskColor(p) { return p >= 60 ? "var(--bad)" : p >= 30 ? "var(--warn)" : "var(--good)"; }
function riskLabel(p) {
  if (p >= 60) return { text: "เสี่ยงสูง ระวังมาก", bg: "rgba(248,113,113,.14)", fg: "#fca5a5" };
  if (p >= 30) return { text: "น่าสงสัย ควรระวัง", bg: "rgba(251,191,36,.14)", fg: "#fbd98a" };
  return { text: "ยังไม่พบสัญญาณอันตราย", bg: "rgba(52,211,153,.14)", fg: "#a7e8cd" };
}
function spinnerBox(text) {
  return el("div", { class: "center card" },
    el("div", { class: "spinner" }),
    el("p", { class: "muted", text }));
}
function errBox(text) { return el("div", { class: "errbox", text }); }
function disclaimerBox(text) {
  return el("div", { class: "disclaimer", text: "⚠️ " + text });
}

/* =====================================================================
   ระบบหน้า: สร้างครั้งเดียว สลับด้วยซ่อน/แสดง
===================================================================== */
const appRoot = document.getElementById("app");
const navRoot = document.getElementById("nav");
const pages = {};   // name -> { root, built, build(), onShow() }
let currentPage = null;

function registerPage(name, build, onShow) {
  const root = el("section", { class: "page", id: "page-" + name });
  appRoot.appendChild(root);
  pages[name] = { root, built: false, build, onShow };
}
function ensureBuilt(name) {
  const p = pages[name];
  if (!p.built) { p.build(p.root); p.built = true; }
}
function showPage(name) {
  ensureBuilt(name);
  for (const [n, p] of Object.entries(pages)) p.root.classList.toggle("active", n === name);
  currentPage = name;
  navRoot.style.display = (name === "login") ? "none" : "flex";
  for (const btn of navRoot.querySelectorAll("button")) {
    btn.classList.toggle("on", btn.dataset.page === name);
  }
  const p = pages[name];
  if (p.onShow) p.onShow();
  window.scrollTo(0, 0);
}

/* ---------- bottom nav (5 ปุ่ม) ---------- */
const NAV_ITEMS = [
  { page: "home", icon: "🏠", label: "หน้าหลัก" },
  { page: "check", icon: "🔍", label: "ตรวจสอบ" },
  { page: "learn", icon: "📚", label: "เรียนรู้" },
  { page: "chat", icon: "💬", label: "ผู้ช่วย" },
  { page: "me", icon: "👤", label: "ของฉัน" },
];
for (const item of NAV_ITEMS) {
  const b = el("button", { "data-page": item.page },
    el("span", { class: "ic", text: item.icon }),
    el("span", { text: item.label }));
  b.addEventListener("click", () => showPage(item.page));
  navRoot.appendChild(b);
}

/* =====================================================================
   หน้า 1: เข้าสู่ระบบ (แท็บสมัคร/เข้าสู่ระบบ + ผู้เยี่ยมชม)
===================================================================== */
const LOGO_SVG = `<svg viewBox="0 0 64 64" width="76" height="76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="lg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
    <stop stop-color="#38bdf8"/><stop offset="1" stop-color="#0369a1"/>
  </linearGradient></defs>
  <path d="M32 5 L55 14 V31 C55 45 45.5 55 32 59 C18.5 55 9 45 9 31 V14 Z"
        fill="url(#lg)" fill-opacity=".14" stroke="url(#lg)" stroke-width="2.6" stroke-linejoin="round"/>
  <path d="M22.5 32.5 L29.5 39.5 L42.5 24.5" stroke="#38bdf8" stroke-width="4.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

registerPage("login", (root) => {
  root.appendChild(el("div", { class: "logo" },
    el("div", { class: "logo-badge", html: LOGO_SVG }),
    el("h1", { class: "brand" },
      el("span", { class: "brand-thin", text: "DEEPFAKE" }),
      el("span", { class: "brand-bold", text: " DETECTOR" })),
    el("p", { class: "muted", text: "ตรวจคลิป ลิงก์ และข้อความน่าสงสัย ฟรี" })));

  const card = el("div", { class: "card" });

  // แท็บ
  let mode = "login";
  const tabLogin = el("button", { class: "on", text: "เข้าสู่ระบบ" });
  const tabReg = el("button", { text: "สมัครใหม่" });
  card.appendChild(el("div", { class: "tabs" }, tabLogin, tabReg));

  const inUser = el("input", { type: "text", autocomplete: "username", placeholder: "เช่น สมชาย" });
  const inPass = el("input", { type: "password", autocomplete: "current-password", placeholder: "อย่างน้อย 6 ตัวอักษร" });
  card.appendChild(el("div", { class: "field" }, el("label", { text: "ชื่อผู้ใช้" }), inUser));
  card.appendChild(el("div", { class: "field" }, el("label", { text: "รหัสผ่าน" }), inPass));

  const msg = el("div", { class: "hidden" });
  card.appendChild(msg);

  const submitBtn = el("button", { class: "btn", text: "เข้าสู่ระบบ" });
  card.appendChild(submitBtn);

  card.appendChild(el("div", { class: "hr-text", text: "หรือ" }));
  const guestBtn = el("button", { class: "btn secondary", text: "เข้าใช้แบบผู้เยี่ยมชม (ไม่ต้องสมัคร)" });
  card.appendChild(guestBtn);
  root.appendChild(card);

  function setMode(m) {
    mode = m;
    tabLogin.classList.toggle("on", m === "login");
    tabReg.classList.toggle("on", m === "register");
    submitBtn.textContent = m === "login" ? "เข้าสู่ระบบ" : "สมัครและเข้าใช้เลย";
    inPass.setAttribute("autocomplete", m === "login" ? "current-password" : "new-password");
    msg.classList.add("hidden");
  }
  tabLogin.addEventListener("click", () => setMode("login"));
  tabReg.addEventListener("click", () => setMode("register"));

  function showMsg(text) {
    msg.className = "errbox"; msg.style.marginBottom = "12px";
    msg.textContent = text;
  }

  async function submit() {
    const username = inUser.value.trim();
    const password = inPass.value;
    if (!username || !password) { showMsg("กรอกชื่อผู้ใช้และรหัสผ่านก่อนนะคะ"); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = "กำลังดำเนินการ...";
    try {
      const d = await post(mode === "login" ? "/api/login" : "/api/register", { username, password });
      saveAuth(d.token, d.username);
      inPass.value = "";
      msg.classList.add("hidden");
      refreshMePage();
      showPage("home");
    } catch (e) {
      showMsg(e.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = mode === "login" ? "เข้าสู่ระบบ" : "สมัครและเข้าใช้เลย";
    }
  }
  submitBtn.addEventListener("click", submit);
  inPass.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });

  guestBtn.addEventListener("click", () => {
    saveGuest();
    refreshMePage();
    showPage("home");
  });
});

async function loadGoldenRules(container) {
  try {
    if (!goldenRulesCache) goldenRulesCache = (await api("/api/golden-rules")).rules;
    container.textContent = "";
    for (const r of goldenRulesCache) {
      container.appendChild(el("div", { class: "card rule-card" },
        el("div", { class: "rule-num", text: String(r.id) }),
        el("div", null,
          el("h3", { text: r.title_th }),
          el("p", { class: "muted", style: "margin-top:6px", text: r.detail_th }))));
    }
  } catch (e) {
    container.textContent = "";
    container.appendChild(errBox("โหลดกฎทองไม่สำเร็จ — " + e.message));
    const retry = el("button", { class: "btn secondary", style: "margin-top:10px", text: "ลองใหม่" });
    retry.addEventListener("click", () => { container.textContent = ""; container.appendChild(spinnerBox("กำลังโหลด...")); loadGoldenRules(container); });
    container.appendChild(retry);
  }
}

let checkTabSetter = null;

  ensureBuilt("check");

registerPage("check", (root) => {
  root.appendChild(el("h1", { text: "ตรวจสอบ" }));
  root.appendChild(el("p", { class: "muted", style: "margin-bottom:14px", text: "เลือกว่าจะตรวจอะไร แล้ววางสิ่งที่สงสัยลงไป" }));

  const tabVideo = el("button", { class: "on", text: "🎬 คลิป / ลิงก์" });

  /* ----- ส่วนคลิป/ลิงก์ + อัปโหลดไฟล์ (สร้างครั้งเดียว) ----- */
  const videoSection = el("div", null);
  const inUrl = el("input", { type: "url", placeholder: "วางลิงก์คลิปที่นี่ เช่น จากยูทูบ เฟซบุ๊ก ติ๊กต็อก" });
  const videoBtn = el("button", { class: "btn", style: "margin-top:10px", text: "ตรวจคลิปจากลิงก์" });
  const videoResult = el("div", { id: "videoResult", style: "margin-top:14px" }); // container ผลลัพธ์ — ไม่มี input ข้างใน
  videoSection.appendChild(el("div", { class: "card" },
    el("div", { class: "field" }, el("label", { text: "วางลิงก์คลิปที่สงสัย" }), inUrl),
    videoBtn,
    el("p", { class: "muted", style: "margin-top:10px", text: "การตรวจคลิปใช้เวลาสักครู่ (อาจถึง 2-3 นาที) ใจเย็น ๆ นะคะ" })));

  videoSection.appendChild(el("div", { class: "hr-text", text: "หรือ (แนะนำ)" }));

  // อัปโหลดไฟล์ — แน่นอนกว่าเมื่อลิงก์จากบางแอปโหลดไม่ได้
  const inFile = el("input", { type: "file", accept: "video/*", style: "display:none" });
  const pickBtn = el("button", { class: "btn secondary", text: "📁 เลือกไฟล์คลิปจากเครื่อง" });
  const fileName = el("p", { class: "muted", style: "margin-top:10px", text: "ยังไม่ได้เลือกไฟล์" });
  const uploadBtn = el("button", { class: "btn", style: "margin-top:10px", text: "ตรวจคลิปที่เลือก" });
  uploadBtn.disabled = true;
  videoSection.appendChild(el("div", { class: "card" },
    el("div", { class: "field" }, el("label", { text: "อัปโหลดไฟล์คลิป" }), inFile, pickBtn, fileName),
    uploadBtn,
    el("p", { class: "muted", style: "margin-top:10px", text: "ถ้าวางลิงก์แล้วโหลดไม่ได้ (เช่น TikTok/YouTube) ให้เซฟคลิปลงเครื่องก่อนแล้วเลือกไฟล์ตรงนี้ — ได้ผลชัวร์กว่า" })));

  videoSection.appendChild(videoResult);

  /* ----- ส่วนข้อความ/SMS (สร้างครั้งเดียว) ----- */
  const textSection = el("div", { class: "hidden" });
  const inText = el("textarea", { placeholder: "วางข้อความที่ได้รับมา เช่น SMS แชท หรือคำพูดที่มีคนโทรมาบอก" });
  const textBtn = el("button", { class: "btn", style: "margin-top:10px", text: "ตรวจข้อความนี้" });
  const textResult = el("div", { id: "textResult", style: "margin-top:14px" }); // container ผลลัพธ์
  textSection.appendChild(el("div", { class: "card" },
    el("div", { class: "field" }, el("label", { text: "ข้อความที่สงสัย" }), inText),
    textBtn));
  textSection.appendChild(textResult);

  root.appendChild(videoSection);
  root.appendChild(textSection);

  function setTab(tab) {
    tabVideo.classList.toggle("on", tab === "video");
    tabText.classList.toggle("on", tab === "text");
    videoSection.classList.toggle("hidden", tab !== "video");
    textSection.classList.toggle("hidden", tab !== "text");
  }
  tabVideo.addEventListener("click", () => setTab("video"));
  tabText.addEventListener("click", () => setTab("text"));
  checkTabSetter = setTab;

  /* ----- แสดงผลความเสี่ยง (เขียนเฉพาะ container ผลลัพธ์) ----- */
  function renderRisk(container, percent, signals, verdict, advice, disclaimer, extraNodes) {
    container.textContent = "";
    const lbl = riskLabel(percent);
    const card = el("div", { class: "card" });
    const p = Math.round(percent);
    const color = riskColor(percent);
    const R = 52, C = 2 * Math.PI * R;
    const ring = el("div", { class: "ring-wrap" });
    // SVG static ที่สร้างเองจากตัวเลขล้วน — ไม่มีข้อความผู้ใช้ปน
    ring.innerHTML =
      `<svg width="136" height="136" viewBox="0 0 136 136">
        <circle cx="68" cy="68" r="${R}" fill="none" stroke="rgba(146,180,255,.12)" stroke-width="12"/>
        <circle cx="68" cy="68" r="${R}" fill="none" stroke="${color}" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="${(C * Math.max(p, 1) / 100).toFixed(1)} ${C.toFixed(1)}"
          transform="rotate(-90 68 68)"/>
        <text x="68" y="66" text-anchor="middle" fill="${color}" font-size="31" font-weight="800">${p}%</text>
        <text x="68" y="90" text-anchor="middle" fill="#8fa3bf" font-size="13.5">ความเสี่ยง</text>
      </svg>`;
    ring.appendChild(el("span", { class: "badge", style: `background:${lbl.bg};color:${lbl.fg}`, text: lbl.text }));
    card.appendChild(ring);
    if (verdict) card.appendChild(el("p", { style: "margin-top:12px;font-weight:600", text: verdict }));
    if (signals && signals.length) {
      card.appendChild(el("h3", { style: "margin-top:12px", text: "จุดสังเกต" }));
      for (const s of signals) {
        card.appendChild(el("div", { class: "signal" }, el("span", { class: "dot", text: "🔎" }), el("span", { text: s })));
      }
    }
    if (advice) card.appendChild(el("p", { style: "margin-top:12px;line-height:1.6", text: "💡 " + advice }));
    if (extraNodes) for (const n of extraNodes) card.appendChild(n);
    card.appendChild(disclaimerBox(disclaimer || "ผลนี้เป็นเพียงสัญญาณเตือนให้ระวัง ไม่ใช่คำตัดสิน 100%"));
    container.appendChild(card);
  }

  /* ----- ตรวจข้อความ ----- */
  textBtn.addEventListener("click", async () => {
    const text = inText.value.trim();
    if (!text) {
      textResult.textContent = "";
      textResult.appendChild(errBox("วางข้อความที่ต้องการตรวจก่อนนะคะ"));
      return;
    }
    textBtn.disabled = true;
    textResult.textContent = "";
    textResult.appendChild(spinnerBox("กำลังอ่านข้อความ..."));
    try {
      const d = await post("/api/analyze-text", { text });
      renderRisk(textResult, d.risk_percent, d.signals_th, d.verdict_th, d.advice_th, d.disclaimer_th);
    } catch (e) {
      textResult.textContent = "";
      textResult.appendChild(errBox(e.message));
    } finally {
      textBtn.disabled = false;
    }
  });

  /* ----- แสดงผลตรวจคลิป (ใช้ร่วมกันทั้งลิงก์และไฟล์) ----- */
  function showVideoResult(d) {
    videoResult.textContent = "";
    if (d.status === "ok") {
      const extras = [];
      extras.push(el("p", { class: "muted", style: "margin-top:10px", text: `ดูภาพจากคลิปทั้งหมด ${d.frames_analyzed} ช่วง พบใบหน้า ${d.faces_found} ช่วง` }));
      if (d.suspicious_timestamps && d.suspicious_timestamps.length) {
        const times = d.suspicious_timestamps.slice(0, 8).map((t) => {
          const m = Math.floor(t / 60), s = Math.round(t % 60);
          return `${m}:${String(s).padStart(2, "0")}`;
        }).join(", ");
        extras.push(el("p", { class: "muted", style: "margin-top:6px", text: `ช่วงเวลาที่น่าสงสัย (นาที:วินาที): ${times}` }));
      }
      renderRisk(videoResult, d.risk_percent, null,
        d.risk_percent >= 60 ? "คลิปนี้มีสัญญาณของการปลอมแปลงค่อนข้างมาก" :
        d.risk_percent >= 30 ? "คลิปนี้มีบางจุดน่าสงสัย ควรตรวจสอบเพิ่ม" :
        "ยังไม่พบสัญญาณการปลอมแปลงที่ชัดเจน",
        d.risk_percent >= 30 ? "อย่าเพิ่งเชื่อหรือโอนเงินตามคลิปนี้ ตรวจสอบกับเจ้าตัวหรือแหล่งข่าวจริงก่อน" :
        "ถึงคลิปจะดูปกติ ถ้ามีการขอเงินหรือขอรหัส ให้ยึดกฎทอง 3 ข้อเสมอ",
        d.disclaimer_th, extras);
    } else {
      // no_face / unavailable / error → แสดงคำอธิบายไทยตรง ๆ
      videoResult.appendChild(el("div", { class: "card" },
        el("h3", { text: d.status === "no_face" ? "😶 ไม่พบใบหน้าในคลิป" : "ตรวจคลิปไม่สำเร็จ" }),
        el("p", { style: "margin-top:8px;line-height:1.6", text: d.error_th || "เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะคะ" }),
        disclaimerBox(d.disclaimer_th)));
    }
  }

  /* ----- ตรวจคลิปจากลิงก์ ----- */
  videoBtn.addEventListener("click", async () => {
    const url = inUrl.value.trim();
    if (!url) {
      videoResult.textContent = "";
      videoResult.appendChild(errBox("วางลิงก์คลิปที่ต้องการตรวจก่อนนะคะ"));
      return;
    }
    videoBtn.disabled = true;
    videoBtn.textContent = "กำลังตรวจ...";
    videoResult.textContent = "";
    videoResult.appendChild(spinnerBox("กำลังดูคลิปให้อยู่ค่ะ อาจใช้เวลา 2-3 นาที อย่าเพิ่งปิดหน้านี้นะคะ"));
    try {
      showVideoResult(await post("/api/analyze-video", { url }));
    } catch (e) {
      videoResult.textContent = "";
      videoResult.appendChild(errBox(e.message));
    } finally {
      videoBtn.disabled = false;
      videoBtn.textContent = "ตรวจคลิปจากลิงก์";
    }
  });

  /* ----- ตรวจคลิปจากไฟล์อัปโหลด ----- */
  pickBtn.addEventListener("click", () => inFile.click());
  inFile.addEventListener("change", () => {
    const f = inFile.files && inFile.files[0];
    fileName.textContent = f ? `เลือกแล้ว: ${f.name}` : "ยังไม่ได้เลือกไฟล์";
    uploadBtn.disabled = !f;
  });
  uploadBtn.addEventListener("click", async () => {
    const f = inFile.files && inFile.files[0];
    if (!f) return;
    uploadBtn.disabled = true;
    uploadBtn.textContent = "กำลังตรวจ...";
    videoResult.textContent = "";
    videoResult.appendChild(spinnerBox("กำลังอัปโหลดและดูคลิปให้อยู่ค่ะ อาจใช้เวลา 2-3 นาที อย่าเพิ่งปิดหน้านี้นะคะ"));
    try {
      const form = new FormData();
      form.append("file", f);
      const res = await fetch(apiBase() + "/api/analyze-video-file", { method: "POST", body: form });
      const d = await res.json();
      if (!res.ok) throw new Error((d && d.error_th) || "อัปโหลดไม่สำเร็จ ลองใหม่นะคะ");
      showVideoResult(d);
    } catch (e) {
      videoResult.textContent = "";
      videoResult.appendChild(errBox(e.message));
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "ตรวจคลิปที่เลือก";
    }
  });
});

registerPage("learn", (root) => {
  root.appendChild(el("h1", { text: "เรียนรู้" }));
  root.appendChild(el("p", { class: "muted", style: "margin-bottom:14px", text: "รู้ทันมิจฉาชีพ = เกราะที่ดีที่สุด" }));

  /* กฎทอง */
  root.appendChild(el("h2", { text: "กฎทอง 3 ข้อ" }));
  const rulesBox = el("div", null);
  rulesBox.appendChild(spinnerBox("กำลังโหลด..."));
  root.appendChild(rulesBox);
  loadGoldenRules(rulesBox);

  /* รูปแบบมิจฉาชีพ (accordion) */
  root.appendChild(el("h2", { text: "9 กลโกงที่ต้องรู้จัก" }));
  const accBox = el("div", null);
  accBox.appendChild(spinnerBox("กำลังโหลด..."));
  root.appendChild(accBox);

  (async function loadPatterns() {
    try {
      const d = await api("/api/scam-patterns");
      accBox.textContent = "";
      for (const p of d.patterns) {
        const item = el("div", { class: "acc-item" });
        const head = el("button", { class: "acc-head" },
          el("span", { class: "acc-ic", text: p.icon }), el("span", { text: p.name_th }),
          el("span", { class: "ar", text: "▶" }));
        head.addEventListener("click", () => item.classList.toggle("open"));
        const body = el("div", { class: "acc-body" },
          el("p", { class: "muted", text: p.description_th }),
          el("div", { class: "acc-warn", text: "🛡️ " + p.warning_th }));
        item.appendChild(head); item.appendChild(body);
        accBox.appendChild(item);
      }
    } catch (e) {
      accBox.textContent = "";
      accBox.appendChild(errBox("โหลดข้อมูลไม่สำเร็จ — " + e.message));
    }
  })();

  /* แบบทดสอบ 7 ข้อ — อัปเดตเฉพาะ #quizArea (ไม่มี input ข้างใน) */
  root.appendChild(el("h2", { text: "ลองทดสอบตัวเอง (7 ข้อ)" }));
  const quizArea = el("div", { id: "quizArea" });
  root.appendChild(quizArea);

  let qIndex = 0, score = 0, answered = false;

  function renderQuestion() {
    quizArea.textContent = "";
    answered = false;
    const item = QUIZ[qIndex];
    const card = el("div", { class: "card" });
    card.appendChild(el("p", { class: "muted", text: `ข้อ ${qIndex + 1} จาก ${QUIZ.length} • ตอบถูกแล้ว ${score} ข้อ` }));
    card.appendChild(el("div", { class: "quiz-progress" },
      el("div", { style: `width:${Math.round((qIndex / QUIZ.length) * 100)}%` })));
    card.appendChild(el("h3", { style: "margin:8px 0 14px;line-height:1.55", text: item.q }));

    const explainSlot = el("div", null);
    const nextSlot = el("div", null);
    const choiceBtns = [];

    item.choices.forEach((choice, i) => {
      const b = el("button", { class: "quiz-choice", text: choice });
      b.addEventListener("click", () => {
        if (answered) return;
        answered = true;
        const correct = i === item.answer;
        if (correct) score++;
        b.classList.add(correct ? "correct" : "wrong");
        choiceBtns[item.answer].classList.add("correct");
        for (const cb of choiceBtns) cb.disabled = true;

        explainSlot.appendChild(el("div", { class: "quiz-explain " + (correct ? "ok" : "no"),
          text: (correct ? "✅ ถูกต้องค่ะ! " : "❌ ยังไม่ใช่ค่ะ ") + item.explain }));

        const nextBtn = el("button", { class: "btn", text: qIndex + 1 < QUIZ.length ? "ข้อต่อไป ➜" : "ดูคะแนนรวม" });
        nextBtn.addEventListener("click", () => {
          qIndex++;
          if (qIndex < QUIZ.length) renderQuestion();
          else renderSummary();
        });
        nextSlot.appendChild(nextBtn);
      });
      choiceBtns.push(b);
      card.appendChild(b);
    });

    card.appendChild(explainSlot);
    card.appendChild(nextSlot);
    quizArea.appendChild(card);
  }

  function renderSummary() {
    quizArea.textContent = "";
    const pct = score / QUIZ.length;
    const verdict = pct === 1 ? "🏆 เยี่ยมมาก! คุณรู้ทันมิจฉาชีพสุด ๆ" :
      pct >= 0.7 ? "👍 เก่งมาก! เกือบเต็มแล้ว" :
      pct >= 0.5 ? "🙂 ดีค่ะ แต่ทบทวนอีกนิดจะปลอดภัยขึ้น" :
      "💪 ไม่เป็นไรค่ะ ลองอ่านกลโกงด้านบนแล้วทำใหม่นะคะ";
    const card = el("div", { class: "card center" },
      el("div", { style: "font-size:3rem", text: pct >= 0.7 ? "🎉" : "📖" }),
      el("h2", { text: `ได้ ${score} จาก ${QUIZ.length} ข้อ` }),
      el("p", { class: "muted", style: "margin:8px 0 16px", text: verdict }));
    const retry = el("button", { class: "btn", text: "ทำแบบทดสอบใหม่" });
    retry.addEventListener("click", () => { qIndex = 0; score = 0; renderQuestion(); });
    card.appendChild(retry);
    quizArea.appendChild(card);
  }

  renderQuestion();
});

/* =====================================================================
   หน้า 5: ผู้ช่วย (แชทบอท)
===================================================================== */
registerPage("chat", (root) => {
  root.appendChild(el("h1", { text: "ผู้ช่วย" }));
  root.appendChild(el("p", { class: "muted", style: "margin-bottom:14px", text: "ถามเรื่องกลโกง คลิปปลอม หรือขอคำแนะนำได้เลยค่ะ" }));

  const messages = el("div", { id: "chatMessages" }); // container ผลลัพธ์ — append เท่านั้น
  root.appendChild(messages);

  const inMsg = el("input", { type: "text", placeholder: "พิมพ์คำถามที่นี่..." });
  const sendBtn = el("button", { class: "btn", text: "ส่ง" });
  root.appendChild(el("div", { class: "chatrow" }, inMsg, sendBtn));

  const history = [];

  function addMsg(role, text) {
    messages.appendChild(el("div", { class: "msg " + (role === "user" ? "user" : "bot"), text }));
    messages.scrollTop = messages.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }

  addMsg("bot", "สวัสดีค่ะ 👋 มีอะไรให้ช่วยไหมคะ\nลองถามเช่น “มีคนโทรมาอ้างเป็นตำรวจ ทำยังไงดี” หรือ “คลิปดาราชวนลงทุน เชื่อได้ไหม”");

  let sending = false;
  async function send() {
    const text = inMsg.value.trim();
    if (!text || sending) return;
    sending = true;
    inMsg.value = "";
    addMsg("user", text);
    const waiting = el("div", { class: "msg bot", text: "กำลังคิดอยู่ค่ะ..." });
    messages.appendChild(waiting);
    try {
      const d = await post("/api/chat", { message: text, history: history.slice(-6) });
      waiting.textContent = d.reply_th;
      history.push({ role: "user", text });
      history.push({ role: "bot", text: d.reply_th });
    } catch (e) {
      waiting.textContent = "ขอโทษค่ะ ตอบไม่ได้ตอนนี้ (" + e.message + ") ลองใหม่อีกครั้งนะคะ";
    } finally {
      sending = false;
      window.scrollTo(0, document.body.scrollHeight);
    }
  }
  sendBtn.addEventListener("click", send);
  inMsg.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
});

/* =====================================================================
   หน้า 6: ของฉัน — ชื่อผู้ใช้ สายด่วน ตั้งค่าเซิร์ฟเวอร์ ออกจากระบบ
===================================================================== */
let refreshMePage = () => {};

registerPage("me", (root) => {
  root.appendChild(el("h1", { text: "ของฉัน" }));

  const userCard = el("div", { class: "card" });
  root.appendChild(userCard);

  /* สายด่วน */
  const hotCard = el("div", { class: "card" }, el("h3", { text: "สายด่วนควรรู้" }));
  hotCard.appendChild(el("div", { class: "hotline-card" },
    el("span", { class: "hotline-num", text: "1441" }),
    el("span", { class: "muted", text: "สายด่วนตำรวจไซเบอร์ — แจ้งถูกหลอกออนไลน์ อายัดบัญชี (โทรฟรี 24 ชม.)" })));
  hotCard.appendChild(el("div", { class: "hotline-card" },
    el("span", { class: "hotline-num", text: "191" }),
    el("span", { class: "muted", text: "เหตุด่วนเหตุร้าย" })));
  root.appendChild(hotCard);

  /* ตั้งค่าที่อยู่เซิร์ฟเวอร์ */
  const srvCard = el("div", { class: "card" }, el("h3", { text: "ตั้งค่าที่อยู่เซิร์ฟเวอร์" }),
    el("p", { class: "muted", style: "margin:6px 0 10px", text: "ปกติไม่ต้องแก้ — ใช้เมื่อผู้ดูแลบอกให้เปลี่ยนเท่านั้น" }));
  const inSrv = el("input", { type: "url", placeholder: "ปล่อยว่าง = ใช้ที่อยู่เดียวกับหน้าเว็บนี้" });
  inSrv.value = localStorage.getItem("apiBase") || "";
  const srvMsg = el("p", { class: "muted", style: "margin-top:8px" });
  const srvBtn = el("button", { class: "btn secondary", style: "margin-top:10px", text: "บันทึกที่อยู่เซิร์ฟเวอร์" });
  srvBtn.addEventListener("click", async () => {
    const v = inSrv.value.trim().replace(/\/+$/, "");
    if (!v) {
      localStorage.removeItem("apiBase");
      srvMsg.textContent = "✅ กลับไปใช้ที่อยู่อัตโนมัติแล้วค่ะ";
      return;
    }
    srvMsg.textContent = "กำลังทดสอบการเชื่อมต่อ...";
    try {
      const res = await fetch(v + "/api/health");
      if (!res.ok) throw new Error();
      localStorage.setItem("apiBase", v);
      srvMsg.textContent = "✅ เชื่อมต่อได้ บันทึกแล้วค่ะ";
    } catch (e) {
      srvMsg.textContent = "❌ เชื่อมต่อที่อยู่นี้ไม่ได้ ตรวจสอบแล้วลองใหม่นะคะ";
    }
  });
  srvCard.appendChild(el("div", { class: "field" }, inSrv));
  srvCard.appendChild(srvBtn);
  srvCard.appendChild(srvMsg);
  root.appendChild(srvCard);

  /* ออกจากระบบ */
  const outBtn = el("button", { class: "btn danger", text: "ออกจากระบบ" });
  outBtn.addEventListener("click", async () => {
    const token = state.token;
    clearAuth();
    if (token) { try { await post("/api/logout", { token }); } catch (e) { /* ไม่เป็นไร */ } }
    showPage("login");
  });
  root.appendChild(outBtn);

  refreshMePage = function () {
    userCard.textContent = "";
    if (state.guest) {
      userCard.appendChild(el("h3", { text: "ผู้เยี่ยมชม" }));
      userCard.appendChild(el("p", { class: "muted", style: "margin-top:6px", text: "คุณกำลังใช้แบบไม่ได้สมัครสมาชิก สมัครได้ทุกเมื่อจากหน้าเข้าสู่ระบบ" }));
    } else {
      userCard.appendChild(el("h3", { text: "คุณ" + (state.username || "") }));
      userCard.appendChild(el("p", { class: "muted", style: "margin-top:6px", text: "เข้าสู่ระบบอยู่" }));
    }
  };
  refreshMePage();
});

/* =====================================================================
   เริ่มแอป: จำสถานะล็อกอิน + ตรวจ token กับเซิร์ฟเวอร์
===================================================================== */
(async function start() {
  if (state.token) {
    // ตรวจว่า token ยังใช้ได้ (เซิร์ฟเวอร์อาจรีสตาร์ต) — เงียบ ๆ ไม่รบกวนผู้ใช้
    try {
      const d = await post("/api/me", { token: state.token });
      state.username = d.username;
      localStorage.setItem("username", d.username);
    } catch (e) {
      if (e.data && e.data.ok === false) clearAuth(); // token ตายจริง — ถ้าแค่เน็ตล่มให้คงไว้
    }
  }
  showPage(isLoggedIn() ? "home" : "login");
})();
